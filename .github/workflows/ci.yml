name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A new push to a PR makes the in-flight run obsolete — cancel it rather than
# burn minutes finishing a check nobody will read.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

  rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # The Firestore emulator is a Java process. ubuntu-latest ships a JDK, but
      # pinning it keeps the run reproducible when the image bumps.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci

      - name: Unit tests (pure services)
        run: npm run test:unit

      - name: Run rules tests against the emulator
        run: npm run test:rules

      - name: Publish-engine integration test
        run: npm run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # No secrets are provided here on purpose. The build must succeed without
      # them — `lib/env.ts` validates lazily precisely so a secret-less CI or
      # Preview build compiles instead of dying at module load.
      - name: Build
        run: npm run build

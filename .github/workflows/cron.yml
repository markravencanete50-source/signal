name: Scheduled jobs

# Free scheduler for Signal's cron endpoints (DECISIONS #007 fallback for the
# Vercel Hobby plan, which can't run vercel.json crons). Each schedule pings an
# authenticated cron route with the shared secret; the routes are idempotent and
# safe to re-run, so a late or duplicated trigger never double-publishes.
#
# Requirements (GitHub → repo → Settings):
#   - Secrets → Actions → CRON_SECRET   = the same value as Vercel's CRON_SECRET
#   - Variables → Actions → APP_URL      = https://signal-orcin-six.vercel.app
#     (optional; falls back to the hard-coded production URL below)
#
# Caveats of GitHub-hosted cron (vs Vercel Pro):
#   - Minimum interval is 5 minutes, so "publish every minute" becomes every 5.
#     Due posts still publish — just within a ~5-minute window of their time.
#   - Scheduled runs can be DELAYED under GitHub load (occasionally 10-20 min).
#     Fine for a social scheduler; not for to-the-second precision.
#   - Scheduled workflows auto-disable after 60 days with no repo commits.
# For minute-level precision use cron-job.org, or revert 47c6fa7 on Vercel Pro.

on:
  schedule:
    - cron: "*/5 * * * *" # publish        (intended: every minute)
    - cron: "0 * * * *" # publish sweep + sync + autolists (hourly). Publish rides
      # along here as a belt-and-braces catch-up: GitHub's */5 schedule is
      # best-effort and can be throttled for long stretches, and "Publish now"
      # is synchronous in-app anyway — this hourly sweep only exists so a
      # SCHEDULED post is never more than ~an hour late even when */5 stalls.
    - cron: "0 3 * * *" # tokens            (daily 03:00 UTC)
    - cron: "0 8 * * *" # digest            (daily 08:00 UTC)
    - cron: "30 4 * * *" # competitors      (daily 04:30 UTC)
  workflow_dispatch:
    inputs:
      endpoint:
        description: "Cron route to trigger now"
        required: true
        default: publish
        type: choice
        options: [publish, verify, sync, tokens, digest, autolists, competitors]

# Never let two runs of the same schedule overlap; skip rather than pile up.
concurrency:
  group: cron-${{ github.event.schedule || github.event.inputs.endpoint }}
  cancel-in-progress: false

jobs:
  ping:
    name: Trigger cron endpoints
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ vars.APP_URL || 'https://signal-orcin-six.vercel.app' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Ping due endpoints
        run: |
          set -euo pipefail

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

          # Map the firing trigger to the endpoint(s) it should hit.
          case "${{ github.event.schedule }}" in
            "*/5 * * * *") endpoints="publish verify" ;;
            "0 * * * *")   endpoints="publish verify sync autolists" ;;
            "0 3 * * *")   endpoints="tokens" ;;
            "0 8 * * *")   endpoints="digest" ;;
            "30 4 * * *")  endpoints="competitors" ;;
            *)             endpoints="${{ github.event.inputs.endpoint }}" ;;
          esac

          echo "Triggering: $endpoints"
          for name in $endpoints; do
            echo "→ POST $APP_URL/api/cron/$name"
            # -f: fail the step on any HTTP >= 400 (auth failure, route error).
            curl -fsS -m 300 -X POST \
              -H "x-cron-secret: $CRON_SECRET" \
              "$APP_URL/api/cron/$name"
            echo
          done
